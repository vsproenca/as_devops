name: React CI

on:
  push:
    branches: [ main, develop ]

  pull_request:
    branches: [ main ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout código
      uses: actions/checkout@v3

    - name: Instalar Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Instalar dependências
      run: npm install

    - name: Gerar build
      run: npm run build

    - name: Rodar testes
      run: npm test -- --watchAll=false